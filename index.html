<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkForge - Link Management</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
        color: #1f1a44;
        background: linear-gradient(180deg, #f9fbff 0%, #eef4ff 45%, #f8f3ff 100%);
        position: relative;
        overflow-x: hidden;
      }

      .bg-shape {
        position: fixed;
        border-radius: 14px;
        filter: blur(0.5px);
        pointer-events: none;
        z-index: 0;
        opacity: 0.26;
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 18px 36px rgba(99, 102, 241, 0.16);
      }

      .shape-a {
        width: 360px;
        height: 220px;
        top: -34px;
        left: -60px;
        transform: rotate(-10deg);
        background: linear-gradient(145deg, #bfdbfe 0%, #c4b5fd 55%, #dbeafe 100%);
        animation: driftA 16s ease-in-out infinite alternate;
      }

      .shape-b {
        width: 300px;
        height: 180px;
        right: -46px;
        top: 210px;
        transform: rotate(14deg);
        background: linear-gradient(145deg, #67e8f9 0%, #a5b4fc 55%, #e0f2fe 100%);
        animation: driftB 20s ease-in-out infinite alternate;
      }

      .shape-c {
        width: 260px;
        height: 150px;
        left: 34%;
        bottom: -40px;
        transform: rotate(-8deg);
        background: linear-gradient(145deg, #ddd6fe 0%, #bfdbfe 55%, #e0e7ff 100%);
        animation: driftC 18s ease-in-out infinite alternate;
      }

      @keyframes driftA {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(30px, 24px);
        }
      }

      @keyframes driftB {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-34px, -18px);
        }
      }

      @keyframes driftC {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(22px, -26px);
        }
      }

      #bg3d {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
      }

      .container {
        width: min(1120px, 92vw);
        margin: 0 auto;
      }

      .glass {
        background: rgba(255, 255, 255, 0.62);
        border: 2px solid rgba(129, 140, 248, 0.35);
        backdrop-filter: blur(14px);
        box-shadow: 0 14px 26px rgba(30, 27, 75, 0.1), 4px 4px 0 rgba(30, 27, 75, 0.08);
      }

      .nav-wrap {
        position: sticky;
        top: 14px;
        z-index: 30;
        padding-top: 14px;
      }

      .nav {
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 0.95rem 0.75rem 1.2rem;
      }

      .brand {
        font-weight: 800;
        letter-spacing: 0.2px;
        color: #312e81;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 1.2rem;
      }

      .nav-links a {
        text-decoration: none;
        color: #4338ca;
        font-weight: 600;
        font-size: 0.95rem;
        display: inline-block;
        transition: transform 0.12s ease, color 0.15s ease;
      }

      .nav-links a:active {
        transform: translateY(-1px) scale(1.06);
        color: #312e81;
      }

      .cta {
        border: 0;
        border-radius: 12px;
        padding: 0.58rem 1rem;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease;
        box-shadow: 0 8px 16px rgba(79, 70, 229, 0.24);
      }

      .cta:hover {
        transform: translateY(-1px) scale(1.02);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.18);
      }

      .cta:active {
        transform: translateY(-1px) scale(1.06);
        box-shadow: 0 10px 18px rgba(79, 70, 229, 0.2);
        filter: brightness(0.98);
      }

      .hero {
        padding: 4.6rem 0 2rem;
        text-align: center;
      }

      .hero h1 {
        margin: 0 auto;
        max-width: 860px;
        font-size: clamp(2rem, 5vw, 3.7rem);
        line-height: 1.08;
        color: #1e1b4b;
      }

      .hero p {
        margin: 1rem auto 0;
        max-width: 700px;
        font-size: 1.05rem;
        color: #4c4f71;
      }

      .hero-btn {
        margin-top: 1.4rem;
        border: 0;
        border-radius: 12px;
        padding: 0.8rem 1.3rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #8b5cf6);
        cursor: pointer;
        transition: transform 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease;
      }

      .hero-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 26px rgba(99, 102, 241, 0.3);
      }

      .hero-btn:active {
        transform: translateY(2px) scale(0.98);
        box-shadow: 0 5px 12px rgba(99, 102, 241, 0.22);
        filter: brightness(0.98);
      }

      .tool-card {
        border-radius: 14px;
        overflow: hidden;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .tab {
        border: 2px solid rgba(129, 140, 248, 0.35);
        cursor: pointer;
        font-weight: 800;
        font-size: 1.05rem;
        padding: 1.15rem 1rem;
        background: rgba(238, 241, 255, 0.9);
        color: #1e1b4b;
        transition: background 0.25s ease, transform 0.14s ease, box-shadow 0.2s ease;
        box-shadow: inset 0 -2px 0 rgba(79, 70, 229, 0.08);
      }

      .tab.active {
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        border-color: rgba(79, 70, 229, 0.8);
        box-shadow: 0 8px 16px rgba(79, 70, 229, 0.18);
      }

      .tab:active {
        transform: translateY(-1px) scale(1.03);
      }

      .panel {
        padding: 1.8rem;
        min-height: 400px;
      }

      .label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 1.05rem;
        color: #241f57;
        font-weight: 600;
      }

      .required {
        color: #dc2626;
      }

      .field {
        width: 100%;
        font-size: 1rem;
        border: 2px solid #818cf8;
        border-radius: 10px;
        padding: 0.88rem 0.9rem;
        color: #0f172a;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85),
          0 6px 14px rgba(79, 70, 229, 0.1);
      }

      .field.small {
        border-color: #a5b4fc;
      }

      .hint {
        margin-top: 0.35rem;
        font-size: 0.95rem;
        color: #475569;
      }

      .row {
        margin-top: 1.2rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .primary {
        margin-top: 1.2rem;
        width: 100%;
        border: 2px solid rgba(79, 70, 229, 0.7);
        border-radius: 10px;
        background: linear-gradient(135deg, #4f46e5, #8b5cf6);
        color: #fff;
        font-size: 1.05rem;
        font-weight: 700;
        padding: 0.88rem 1rem;
        cursor: pointer;
        transition: transform 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease;
        box-shadow: 0 10px 18px rgba(79, 70, 229, 0.26);
      }

      .primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 22px rgba(99, 102, 241, 0.24);
      }

      .primary:active {
        transform: translateY(-1px) scale(1.03);
        box-shadow: 0 14px 26px rgba(99, 102, 241, 0.28);
        filter: brightness(0.98);
      }

      .primary:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .muted {
        margin-top: 0.9rem;
        color: #475569;
        font-size: 1rem;
      }

      .error {
        margin-top: 0.8rem;
        background: #fee2e2;
        border: 1px solid #fecaca;
        color: #7f1d1d;
        padding: 0.75rem;
        border-radius: 8px;
      }

      .result {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 1.4rem;
        align-items: start;
      }

      .qr-img {
        width: 220px;
        height: 220px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #fff;
        padding: 0.5rem;
      }

      .result h2 {
        margin: 0 0 0.8rem;
        font-size: 1.6rem;
      }

      .actions {
        display: grid;
        gap: 0.7rem;
      }

      .action-btn {
        border: 2px solid rgba(79, 70, 229, 0.7);
        border-radius: 10px;
        padding: 0.75rem 0.9rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        transition: transform 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease;
        box-shadow: 0 8px 14px rgba(30, 27, 75, 0.2);
      }

      .action-btn:hover {
        transform: scale(1.02);
      }

      .action-btn:active {
        transform: translateY(-1px) scale(1.03);
        box-shadow: 0 12px 20px rgba(30, 27, 75, 0.2);
        filter: brightness(0.98);
      }

      .meta {
        margin-top: 0.8rem;
        font-size: 1.15rem;
        color: #0f172a;
        word-break: break-word;
      }

      .meta strong {
        display: inline-block;
        min-width: 160px;
      }

      .link {
        color: #0369a1;
      }

      .secondary {
        margin-top: 1.2rem;
        border: 2px solid #1e40af;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        background: #1d4ed8;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 8px 14px rgba(30, 64, 175, 0.2);
        transition: transform 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease;
      }

      .secondary:active {
        transform: translateY(-1px) scale(1.03);
        box-shadow: 0 12px 20px rgba(30, 64, 175, 0.2);
        filter: brightness(0.98);
      }

      .capabilities {
        margin-top: 3rem;
      }

      .capabilities h2 {
        margin: 0 0 1rem;
        color: #1e1b4b;
        text-align: center;
      }

      .cap-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .cap-item {
        border-radius: 12px;
        padding: 0.9rem;
        min-height: 96px;
        border: 2px solid rgba(129, 140, 248, 0.25);
        box-shadow: 0 10px 18px rgba(67, 56, 202, 0.1);
        transition: transform 0.12s ease, box-shadow 0.16s ease;
        cursor: pointer;
      }

      .cap-item:active {
        transform: translateY(-1px) scale(1.03);
        box-shadow: 0 14px 24px rgba(67, 56, 202, 0.15);
      }

      .cap-item h4 {
        margin: 0 0 0.35rem;
        color: #2e2a66;
        font-size: 0.95rem;
      }

      .cap-item p {
        margin: 0;
        color: #5c6186;
        font-size: 0.85rem;
        line-height: 1.35;
      }

      .faq {
        margin-top: 3.2rem;
        margin-bottom: 2.2rem;
      }

      .faq h2 {
        margin: 0 0 1rem;
        color: #1e1b4b;
      }

      .faq-list {
        display: grid;
        gap: 0.85rem;
      }

      .faq-item {
        border-radius: 12px;
        padding: 1rem 1.05rem;
        border: 2px solid rgba(129, 140, 248, 0.25);
        box-shadow: 0 10px 18px rgba(67, 56, 202, 0.1);
        transition: transform 0.12s ease, box-shadow 0.16s ease;
        cursor: pointer;
      }

      .faq-item:active {
        transform: translateY(-1px) scale(1.02);
        box-shadow: 0 14px 24px rgba(67, 56, 202, 0.14);
      }

      .scroll-target {
        scroll-margin-top: 120px;
      }

      .faq-item h4 {
        margin: 0 0 0.38rem;
        color: #312e81;
      }

      .faq-item p {
        margin: 0;
        color: #50547a;
        font-size: 0.95rem;
      }

      .reveal {
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }

      .reveal.in {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 760px) {
        .row,
        .result {
          grid-template-columns: 1fr;
        }
        .hero {
          padding-top: 3.2rem;
        }
        .nav-links a {
          display: none;
        }
        .qr-img {
          width: 180px;
          height: 180px;
        }
        .cap-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .cap-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bg3d"></canvas>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>
    <div class="bg-shape shape-c"></div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/three@0.164.1/build/three.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      function buildQrUrl(data, format = "png") {
        const formatParam = format === "svg" ? "&format=svg" : "";
        return `https://api.qrserver.com/v1/create-qr-code/?size=260x260${formatParam}&data=${encodeURIComponent(
          data
        )}`;
      }

      function App() {
        const [tab, setTab] = useState("shorten");
        const [shortenUrl, setShortenUrl] = useState("");
        const [customCode, setCustomCode] = useState("");
        const [shortResult, setShortResult] = useState(null);
        const [qrInput, setQrInput] = useState("");
        const [qrResult, setQrResult] = useState(null);
        const [qrShortenAlso, setQrShortenAlso] = useState(false);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");

        useEffect(() => {
          const canvas = document.getElementById("bg3d");
          if (!canvas || !window.THREE) return;

          const scene = new THREE.Scene();
          const camera = new THREE.PerspectiveCamera(
            65,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
          );
          camera.position.z = 5;

          const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: true,
          });
          renderer.setSize(window.innerWidth, window.innerHeight);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

          scene.add(new THREE.AmbientLight(0xffffff, 0.8));
          const light = new THREE.DirectionalLight(0x93c5fd, 1.2);
          light.position.set(4, 2, 3);
          scene.add(light);

          const materialA = new THREE.MeshPhysicalMaterial({
            color: 0xbfdbfe,
            transmission: 0.28,
            roughness: 0.16,
            metalness: 0.2,
            transparent: true,
            opacity: 0.95,
          });

          const materialB = new THREE.MeshStandardMaterial({
            color: 0xc4b5fd,
            roughness: 0.18,
            metalness: 0.36,
          });

          const cuboidA = new THREE.Mesh(
            new THREE.BoxGeometry(1.9, 1.05, 0.7),
            materialA
          );
          cuboidA.position.set(-1.6, 0.25, -1.1);
          cuboidA.rotation.set(0.35, -0.4, 0.2);
          scene.add(cuboidA);

          const cuboidB = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.72, 0.55),
            materialB
          );
          cuboidB.position.set(1.75, -0.25, -1.5);
          cuboidB.rotation.set(-0.2, 0.55, -0.1);
          scene.add(cuboidB);

          const wire = new THREE.Mesh(
            new THREE.BoxGeometry(0.85, 0.85, 0.85),
            new THREE.MeshBasicMaterial({
              color: 0x93c5fd,
              wireframe: true,
              transparent: true,
              opacity: 0.42,
            })
          );
          wire.position.set(0.4, 1.25, -2.2);
          scene.add(wire);

          let frameId;
          const animate = () => {
            frameId = requestAnimationFrame(animate);
            cuboidA.rotation.x += 0.0018;
            cuboidA.rotation.y += 0.0022;
            cuboidB.rotation.y += 0.0028;
            cuboidB.rotation.x -= 0.0013;
            wire.rotation.x += 0.0025;
            wire.rotation.y -= 0.002;
            renderer.render(scene, camera);
          };
          animate();

          const onResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
          };
          window.addEventListener("resize", onResize);

          return () => {
            cancelAnimationFrame(frameId);
            window.removeEventListener("resize", onResize);
            renderer.dispose();
            materialA.dispose();
            materialB.dispose();
          };
        }, []);

        useEffect(() => {
          const elements = Array.from(document.querySelectorAll(".reveal"));
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  entry.target.classList.add("in");
                  observer.unobserve(entry.target);
                }
              });
            },
            { threshold: 0.16 }
          );

          elements.forEach((el) => observer.observe(el));
          return () => observer.disconnect();
        }, []);

        const scrollToSection = (id) => {
          const el = document.getElementById(id);
          if (!el) return;
          const navEl = document.querySelector(".nav-wrap");
          const navHeight = navEl ? navEl.getBoundingClientRect().height : 0;
          const targetY =
            window.scrollY +
            el.getBoundingClientRect().top -
            navHeight -
            20;
          window.scrollTo({ top: Math.max(0, targetY), behavior: "smooth" });
        };

        const apiShorten = async (payload) => {
          const endpoints = ["/api/shorten", "/shorten"];
          let lastError = "Failed to shorten URL";

          for (const endpoint of endpoints) {
            try {
              const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });
              const data = await response.json();
              if (!response.ok) {
                lastError = data.error || "Request failed";
                continue;
              }
              return data;
            } catch (err) {
              lastError = err.message;
            }
          }
          throw new Error(lastError);
        };

        const generateShort = async (e) => {
          e.preventDefault();
          setLoading(true);
          setError("");
          try {
            const payload = { url: shortenUrl.trim() };
            if (customCode.trim()) payload.customCode = customCode.trim();
            const data = await apiShorten(payload);
            const target = data.shortUrl;
            setShortResult({
              destination: shortenUrl.trim(),
              shortUrl: data.shortUrl,
              qrPng: buildQrUrl(target, "png"),
              qrSvg: buildQrUrl(target, "svg"),
            });
            setTab("qr");
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        const generateQrOnly = async (e) => {
          e.preventDefault();
          setLoading(true);
          setError("");
          try {
            const destination = qrInput.trim();
            if (!destination) throw new Error("URL is required");
            if (!/^https?:\/\//i.test(destination)) {
              throw new Error("Enter full URL with http:// or https://");
            }

            let shortUrl = "";
            let qrData = destination;
            if (qrShortenAlso) {
              const data = await apiShorten({ url: destination });
              shortUrl = data.shortUrl;
              qrData = data.shortUrl;
            }

            setQrResult({
              destination,
              shortUrl,
              qrPng: buildQrUrl(qrData, "png"),
              qrSvg: buildQrUrl(qrData, "svg"),
            });
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        const activeResult = useMemo(() => {
          if (tab !== "qr") return null;
          return qrResult || shortResult;
        }, [tab, qrResult, shortResult]);

        const copyText = async (text) => {
          if (!text) return;
          await navigator.clipboard.writeText(text);
          alert("Copied");
        };

        const download = async (url, filename) => {
          const r = await fetch(url);
          const blob = await r.blob();
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        };

        return (
          <div className="page">
            <div className="container nav-wrap">
              <div className="nav glass">
                <div className="brand">LinkForge</div>
                <div className="nav-links">
                  <a
                    href="#tool"
                    onClick={(e) => {
                      e.preventDefault();
                      scrollToSection("tool");
                    }}
                  >
                    Product
                  </a>
                  <a
                    href="#features"
                    onClick={(e) => {
                      e.preventDefault();
                      scrollToSection("features");
                    }}
                  >
                    Capabilities
                  </a>
                  <a
                    href="#faq"
                    onClick={(e) => {
                      e.preventDefault();
                      scrollToSection("faq");
                    }}
                  >
                    Support
                  </a>
                  <button
                    className="cta"
                    type="button"
                    onClick={() => scrollToSection("tool")}
                  >
                    Start Free
                  </button>
                </div>
              </div>
            </div>

            <section className="container hero reveal">
              <h1>Link management, built for speed</h1>
              <p>Shorten links, create QR codes, and share instantly.</p>
            </section>

            <section id="tool" className="container reveal scroll-target">
              <div className="tool-card glass">
                <div className="tabs">
                  <button
                    className={`tab ${tab === "shorten" ? "active" : ""}`}
                    onClick={() => {
                      setTab("shorten");
                      setError("");
                    }}
                    type="button"
                  >
                    Create Short Link
                  </button>
                  <button
                    className={`tab ${tab === "qr" ? "active" : ""}`}
                    onClick={() => {
                      setTab("qr");
                      setError("");
                    }}
                    type="button"
                  >
                    Create QR Code
                  </button>
                </div>

                <div className="panel">
                  {tab === "shorten" && (
                    <form onSubmit={generateShort}>
                      <label className="label">
                        Destination URL <span className="required">*</span>
                      </label>
                      <input
                        className="field"
                        type="url"
                        placeholder="https://your-long-url.com/page"
                        value={shortenUrl}
                        onChange={(e) => setShortenUrl(e.target.value)}
                        required
                      />

                      <div className="row">
                        <div>
                          <label className="label">Custom Code (Optional)</label>
                          <input
                            className="field small"
                            type="text"
                            placeholder="your-custom-code"
                            value={customCode}
                            onChange={(e) => setCustomCode(e.target.value)}
                          />
                          <div className="hint">
                            4-20 chars, letters, numbers, - and _
                          </div>
                        </div>
                      </div>

                      <button className="primary" disabled={loading} type="submit">
                        {loading ? "Creating..." : "Create Short Link"}
                      </button>
                    </form>
                  )}

                  {tab === "qr" && (
                    <>
                      <form onSubmit={generateQrOnly}>
                        <label className="label">
                          URL For QR <span className="required">*</span>
                        </label>
                        <input
                          className="field"
                          type="url"
                          placeholder="https://example.com/page"
                          value={qrInput}
                          onChange={(e) => setQrInput(e.target.value)}
                          required
                        />
                        <label className="hint">
                          <input
                            type="checkbox"
                            checked={qrShortenAlso}
                            onChange={(e) => setQrShortenAlso(e.target.checked)}
                          />{" "}
                          Also shorten URL first and generate QR for short link
                        </label>
                        <button className="primary" type="submit" disabled={loading}>
                          {loading ? "Generating..." : "Generate QR"}
                        </button>
                      </form>

                      {activeResult ? (
                        <div className="result" style={{ marginTop: "1.4rem" }}>
                          <img className="qr-img" src={activeResult.qrPng} alt="QR code" />
                          <div>
                            <h2>Download Your QR Code</h2>
                            <div className="actions">
                              <button
                                className="action-btn"
                                type="button"
                                onClick={() => download(activeResult.qrSvg, "qr-code.svg")}
                              >
                                Download SVG
                              </button>
                              <button
                                className="action-btn"
                                type="button"
                                onClick={() => download(activeResult.qrPng, "qr-code.png")}
                              >
                                Download PNG
                              </button>
                            </div>

                            <div className="meta">
                              <strong>Destination URL</strong>
                              {activeResult.destination}
                            </div>
                            {activeResult.shortUrl && (
                              <div className="meta">
                                <strong>Short URL</strong>
                                <a
                                  className="link"
                                  href={activeResult.shortUrl}
                                  target="_blank"
                                  rel="noreferrer"
                                >
                                  {activeResult.shortUrl}
                                </a>
                              </div>
                            )}

                            <button
                              className="secondary"
                              type="button"
                              onClick={() =>
                                copyText(activeResult.shortUrl || activeResult.destination)
                              }
                            >
                              Copy Link
                            </button>
                          </div>
                        </div>
                      ) : (
                        <p className="muted">Generate a QR code from any URL.</p>
                      )}
                    </>
                  )}

                  {error && <div className="error">{error}</div>}
                </div>
              </div>
            </section>

            <section id="features" className="container capabilities reveal scroll-target">
              <h2>Core Capabilities</h2>
              <div className="cap-grid">
                <article className="cap-item glass">
                  <h4>Simple UI</h4>
                  <p>Focused workflows with clear actions.</p>
                </article>
                <article className="cap-item glass">
                  <h4>API Ready</h4>
                  <p>Runs consistently on local and Vercel routes.</p>
                </article>
                <article className="cap-item glass">
                  <h4>QR Generation</h4>
                  <p>Create QR codes from long or short links.</p>
                </article>
                <article className="cap-item glass">
                  <h4>Analytics Ready</h4>
                  <p>Prepared for click and usage tracking expansion.</p>
                </article>
                <article className="cap-item glass">
                  <h4>Custom Code</h4>
                  <p>Use branded, readable short codes.</p>
                </article>
                <article className="cap-item glass">
                  <h4>Security</h4>
                  <p>Input validation and server checks included.</p>
                </article>
                <article className="cap-item glass">
                  <h4>Fast Redirects</h4>
                  <p>Low-latency redirects with direct code lookup.</p>
                </article>
                <article className="cap-item glass">
                  <h4>Scalable Base</h4>
                  <p>Built for prototypes and production growth.</p>
                </article>
              </div>
            </section>

            <section id="faq" className="container faq reveal scroll-target">
              <h2>FAQ</h2>
              <div className="faq-list">
                <article className="faq-item glass">
                  <h4>Can I create a QR code without shortening first?</h4>
                  <p>Yes. Use the QR tab with any valid URL.</p>
                </article>
                <article className="faq-item glass">
                  <h4>Can I choose my own short code?</h4>
                  <p>Yes, if the code is available.</p>
                </article>
                <article className="faq-item glass">
                  <h4>Which QR formats can I download?</h4>
                  <p>PNG and SVG.</p>
                </article>
                <article className="faq-item glass">
                  <h4>Will links work after deployment?</h4>
                  <p>Yes. Routing is aligned for localhost and Vercel.</p>
                </article>
              </div>
            </section>
            <div style={{ height: "42px" }} />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
